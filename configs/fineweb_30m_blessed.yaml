experiment:
  name: fineweb_30m_blessed
  stage: blessed_30m_scaling
  seed: 1337
  deterministic: false
  notes: "Blessed 30M scaling run: 150M tokens (5 tokens/param) per variant on FineWeb-Edu. Identical hyperparameters across baseline, Full AttnRes, and Block AttnRes; only architecture changes. Inline val loss enabled (no downstream benchmarks during training). Block AttnRes uses num_blocks=3 (2 transformer layers/block); 30M depth is too shallow for the paper's ~8-block granularity."

data:
  dataset_type: fineweb_edu
  dataset_name: fineweb_edu
  tokenizer_name: gpt2
  fineweb_subset: sample-10BT
  val_fraction: 0.005
  hash_modulo: 1000
  block_size: 1024
  batch_size: 8
  eval_batch_size: 8
  num_workers: 0
  pin_memory: true
  max_train_examples: null
  max_train_tokens: null
  max_val_examples: null
  max_val_tokens: null

model:
  architecture: baseline
  size_name: small
  max_seq_len: 1024
  vocab_size: 50257
  d_model: 384
  n_layers: 6
  n_heads: 6
  d_ff: 1536
  dropout: 0.0
  bias: true
  tie_weights: true
  norm_eps: 1.0e-5
  init_std: 0.02
  attnres:
    enabled: false
    mode: full
    num_blocks: null
    window_size: null
    temperature: 1.0
    rmsnorm_keys: true
    zero_init_queries: true
    include_embedding: true
    keep_embedding_in_window: true
    final_readout: true

training:
  max_steps: 2289          # 2289 * 65,536 = 150.0M tokens
  grad_accum_steps: 8      # 8 micro x 8 accum = 64 seqs = 65,536 tokens / step
  learning_rate: 0.0006
  min_lr: 0.00006
  warmup_steps: 100
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  adam_eps: 1.0e-8
  grad_clip: 1.0
  mixed_precision: true
  amp_dtype: bfloat16
  log_interval: 10         # train loss every 10 steps
  eval_interval: 100       # val loss every 100 steps (~6.6M tokens)
  checkpoint_interval: 763 # 763 * 65,536 = 50.0M tokens
  probe_interval: 100000   # effectively off
  eval_max_batches: 50
  device: auto
  resume_from: null
  allow_resume_mismatch: false

logging:
  output_root: outputs
  save_probes: false
  save_checkpoints: true
  keep_last_k_checkpoints: 10

  wandb:
    enabled: true
    project: attnres-next-scale
    entity: null
    mode: auto
    group: blessed_30m_scaling
    job_type: train
    tags: ["blessed", "fineweb_edu", "30m", "scaling"]
    run_name: null

evaluation:
  max_batches: 50
  positionwise_steps: []
