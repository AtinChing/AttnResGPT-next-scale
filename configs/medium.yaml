experiment:
  name: medium_sweep
  stage: full_sweep
  seed: 1337
  deterministic: false
  notes: "Full MEDIUM sweep across 128, 256, and 512 context."

data:
  dataset_type: tinystories
  dataset_name: tinystories
  tokenizer_name: gpt2
  train_split: train
  val_split: validation
  block_size: 128
  batch_size: 8
  eval_batch_size: 8
  num_workers: 0
  pin_memory: true
  max_train_examples: null
  max_train_tokens: 300000
  max_val_examples: null
  max_val_tokens: 60000

model:
  architecture: baseline
  size_name: medium
  max_seq_len: 128
  d_model: 512
  n_layers: 8
  n_heads: 8
  d_ff: 2048
  dropout: 0.1
  bias: true
  tie_weights: true
  norm_eps: 1.0e-5
  init_std: 0.02
  attnres:
    enabled: false
    window_size: null
    temperature: 1.0
    rmsnorm_keys: true
    zero_init_queries: true
    include_embedding: true
    keep_embedding_in_window: true
    final_readout: true

training:
  max_steps: 200
  grad_accum_steps: 2
  learning_rate: 0.00025
  min_lr: 0.000025
  warmup_steps: 40
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  grad_clip: 1.0
  mixed_precision: true
  amp_dtype: bfloat16
  log_interval: 10
  eval_interval: 100
  checkpoint_interval: 100
  probe_interval: 100
  eval_max_batches: 10
  device: auto
  resume_from: null
  allow_resume_mismatch: false

logging:
  output_root: outputs
  save_probes: true
  save_checkpoints: true
  keep_last_k_checkpoints: 2

evaluation:
  max_batches: 10
