experiment:
  name: fineweb_200m_budget
  stage: token_budget_probe
  seed: 1337
  deterministic: false
  notes: "Token-budget probe: 200M dense baseline on FineWeb-Edu, ~1B token horizon. Blessed 30M hyperparameters scaled proportionally (head_dim 64, d_ff=4*d_model). Train + checkpoint only; evals run separately later against Drive checkpoints (eval_interval=0 disables inline + final eval)."

data:
  dataset_type: fineweb_edu
  dataset_name: fineweb_edu
  tokenizer_name: gpt2
  fineweb_subset: sample-10BT
  val_fraction: 0.005
  hash_modulo: 1000
  block_size: 1024
  batch_size: 32           # micro-batch; probe_vram may raise to 64 (accum 1) on A100 40GB
  eval_batch_size: 32
  num_workers: 0
  pin_memory: true
  max_train_examples: null
  max_train_tokens: null
  max_val_examples: null
  max_val_tokens: null

model:
  architecture: baseline
  size_name: medium
  max_seq_len: 1024
  vocab_size: 50257
  d_model: 1024
  n_layers: 12
  n_heads: 16
  d_ff: 4096
  dropout: 0.0
  bias: true
  tie_weights: true
  norm_eps: 1.0e-5
  init_std: 0.02
  attnres:
    enabled: false
    mode: full
    num_blocks: null
    window_size: null
    temperature: 1.0
    rmsnorm_keys: true
    zero_init_queries: true
    include_embedding: true
    keep_embedding_in_window: true
    final_readout: true

training:
  max_steps: 15259         # 15259 * 65,536 tokens = 1.000B tokens
  grad_accum_steps: 2      # 32 micro x 2 accum = 64 seqs = 65,536 tokens / step
  learning_rate: 0.0006
  min_lr: 0.00006
  warmup_steps: 300        # ~2% of horizon
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  adam_eps: 1.0e-8
  grad_clip: 1.0
  mixed_precision: true
  amp_dtype: bfloat16
  log_interval: 20
  eval_interval: 0         # 0 disables inline + final eval (train + checkpoint only)
  checkpoint_interval: 2290  # 2290 * 65,536 = 150.1M tokens -> 6 interval + 1 final = 7 checkpoints
  probe_interval: 100000   # effectively off; save_probes below also disables probe writes
  eval_max_batches: 0
  device: auto
  resume_from: null
  allow_resume_mismatch: false

logging:
  output_root: outputs     # notebook overrides this to the mounted Drive folder
  save_probes: false       # train + checkpoint only
  save_checkpoints: true
  keep_last_k_checkpoints: 20   # keep all ~7 checkpoints (default 2 would prune)

  wandb:
    enabled: true
    project: attnres-next-scale
    entity: null
    mode: auto
    group: token_budget_probe
    job_type: train
    tags: ["token_budget", "fineweb_edu", "200m", "baseline"]
    run_name: null

evaluation:
  max_batches: 0
  positionwise_steps: []
